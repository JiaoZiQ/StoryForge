name: storyforge

x-app-environment: &app-environment
  STORYFORGE_ENVIRONMENT: development
  STORYFORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-storyforge}:${POSTGRES_PASSWORD:-storyforge-dev-only}@postgres:5432/${POSTGRES_DB:-storyforge_dev}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-storyforge}:${POSTGRES_PASSWORD:-storyforge-dev-only}@postgres:5432/${POSTGRES_DB:-storyforge_dev}
  STORYFORGE_LLM_PROVIDER: mock
  STORYFORGE_LLM_MODEL: mock-storyforge-v1
  STORYFORGE_MOCK_MODE: "true"
  STORYFORGE_EMBEDDING_PROVIDER: mock
  STORYFORGE_EMBEDDING_MODEL: mock-hash-embedding-v1
  STORYFORGE_EMBEDDING_DIMENSIONS: "64"
  STORYFORGE_MODEL_PROFILE: offline
  STORYFORGE_PRIVACY_POLICY: offline
  STORYFORGE_PROJECT_SOFT_BUDGET: "5.00"
  STORYFORGE_PROJECT_HARD_BUDGET: "10.00"
  STORYFORGE_WORKFLOW_MAX_COST: "2.00"
  STORYFORGE_WORKFLOW_MAX_TOKENS: "500000"
  STORYFORGE_WORKFLOW_MAX_PROVIDER_CALLS: "100"
  STORYFORGE_PROVIDER_MAX_RETRIES: "2"
  STORYFORGE_PROVIDER_TOTAL_DEADLINE: "120"
  STORYFORGE_RATE_LIMIT_RPM: "60"
  STORYFORGE_RATE_LIMIT_TPM: "1000000"
  STORYFORGE_PROVIDER_MAX_CONCURRENCY: "4"
  STORYFORGE_CIRCUIT_FAILURE_THRESHOLD: "3"
  STORYFORGE_CIRCUIT_COOLDOWN_SECONDS: "30"
  STORYFORGE_ALLOW_UNKNOWN_PRICING: "false"
  STORYFORGE_ENABLE_REAL_PROVIDER_TESTS: "false"
  STORYFORGE_AUTO_MIGRATE: "false"
  STORYFORGE_LOG_LEVEL: INFO
  STORYFORGE_LOG_FORMAT: text
  STORYFORGE_DATABASE_WAIT_ATTEMPTS: "60"
  STORYFORGE_DATABASE_WAIT_INTERVAL_SECONDS: "1"
  STORYFORGE_CHECKPOINT_PATH: /tmp/storyforge/checkpoints.sqlite3
  STORYFORGE_JOB_EXECUTION_MODE: queue
  STORYFORGE_REDIS_URL: redis://redis:6379/0
  STORYFORGE_QUEUE_PREFIX: storyforge
  STORYFORGE_WORKER_CONCURRENCY: "2"
  STORYFORGE_WORKER_HEARTBEAT_SECONDS: "5"
  STORYFORGE_WORKER_OFFLINE_AFTER_SECONDS: "20"
  STORYFORGE_DISTRIBUTED_RATE_LIMIT_ENABLED: "true"
  STORYFORGE_DISTRIBUTED_CIRCUIT_ENABLED: "true"
  STORYFORGE_BOOK_DEFAULT_MODE: sequential
  STORYFORGE_BOOK_MAX_ACTIVE_RUNS_PER_PROJECT: "1"
  STORYFORGE_BOOK_CHAPTER_CONCURRENCY: "1"
  STORYFORGE_BOOK_GLOBAL_CHECK_INTERVAL: "3"
  STORYFORGE_BOOK_MAX_CHAPTER_RETRIES: "2"
  STORYFORGE_BOOK_MAX_GLOBAL_REVISION_ROUNDS: "2"
  STORYFORGE_BOOK_MAX_REVISION_CHAPTERS_PER_ROUND: "3"
  STORYFORGE_BOOK_MIN_PASS_SCORE: "7.0"
  STORYFORGE_BOOK_MIN_FORESHADOWING_PAYOFF_RATE: "0.60"
  STORYFORGE_BOOK_MAX_COST: "5.00"
  STORYFORGE_BOOK_MAX_TOKENS: "1000000"
  STORYFORGE_BOOK_MAX_PROVIDER_CALLS: "250"

services:
  redis:
    image: redis:7.4.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - storyforge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [storyforge_internal]

  postgres:
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storyforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storyforge-dev-only}
      POSTGRES_DB: ${POSTGRES_DB:-storyforge_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54329}:5432"
    volumes:
      - storyforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    networks: [storyforge_internal, storyforge_ingress]

  migrate:
    image: storyforge:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["storyforge-migrate"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [storyforge_internal]

  api:
    image: storyforge:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *app-environment
      STORYFORGE_API_HOST: 0.0.0.0
      STORYFORGE_API_PORT: "8000"
      STORYFORGE_HEALTHCHECK_PATH: /api/v1/ready
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "storyforge-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    volumes:
      - storyforge_checkpoint_data:/tmp/storyforge
    networks: [storyforge_internal]

  dispatcher:
    image: storyforge:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["storyforge-dispatcher"]
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "storyforge-queue-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks: [storyforge_internal]

  worker:
    image: storyforge:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["storyforge-worker"]
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "storyforge-queue-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    deploy:
      replicas: 2
    volumes:
      - storyforge_checkpoint_data:/tmp/storyforge
    networks: [storyforge_internal]

  frontend:
    image: storyforge-web:local
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      STORYFORGE_INTERNAL_API_URL: http://api:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    networks: [storyforge_internal]

  gateway:
    image: storyforge-gateway:local
    build:
      context: .
      dockerfile: deploy/ingress.Dockerfile
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${STORYFORGE_API_PORT:-8000}:8000"
      - "127.0.0.1:${STORYFORGE_WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "Promise.all([fetch('http://127.0.0.1:3000'),fetch('http://127.0.0.1:8000/health')]).then(r=>{if(r.some(x=>!x.ok))process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    networks: [storyforge_internal, storyforge_ingress]

volumes:
  storyforge_postgres_data:
  storyforge_redis_data:
  storyforge_checkpoint_data:

networks:
  storyforge_internal:
    internal: true
  storyforge_ingress:
