name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

env:
  UV_LOCKED: "1"
  UV_NO_PROGRESS: "1"
  STORYFORGE_ENABLE_REAL_PROVIDER_TESTS: "false"

jobs:
  quality:
    name: Python 3.12 quality and SQLite tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest -m "not postgres"

  frontend-quality:
    name: Next.js quality, API contract, unit tests, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --locked --all-groups
      - run: npm ci
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npm run check:api
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  postgres-tests:
    name: PostgreSQL 16 migrations and integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16-bookworm
        env:
          POSTGRES_USER: storyforge
          POSTGRES_PASSWORD: storyforge-ci-test-only
          POSTGRES_DB: storyforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyforge -d storyforge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://storyforge:storyforge-ci-test-only@127.0.0.1:5432/storyforge_test
      STORYFORGE_DATABASE_URL: postgresql+psycopg://storyforge:storyforge-ci-test-only@127.0.0.1:5432/storyforge_test
      STORYFORGE_POSTGRES_TEST_URL: postgresql+psycopg://storyforge:storyforge-ci-test-only@127.0.0.1:5432/storyforge_test
      STORYFORGE_ENVIRONMENT: test
      STORYFORGE_LLM_PROVIDER: mock
      STORYFORGE_EMBEDDING_PROVIDER: mock
      STORYFORGE_EMBEDDING_MODEL: mock-hash-embedding-v1
      STORYFORGE_EMBEDDING_DIMENSIONS: "64"
      STORYFORGE_MOCK_MODE: "true"
      STORYFORGE_MODEL_PROFILE: offline
      STORYFORGE_PRIVACY_POLICY: offline
      STORYFORGE_CHECKPOINT_PATH: /tmp/storyforge-ci-checkpoints.sqlite3
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run alembic upgrade head
      - run: uv run alembic check
      - run: uv run pytest -m postgres --no-cov
      - run: uv run alembic upgrade head
      - run: uv run storyforge demo-m10 --output json

  browser-e2e:
    name: PostgreSQL Mock browser end-to-end tests
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: storyforge
      POSTGRES_PASSWORD: storyforge-e2e-only
      POSTGRES_DB: storyforge_e2e
      POSTGRES_PORT: "54329"
      STORYFORGE_API_PORT: "8000"
      STORYFORGE_WEB_PORT: "3000"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: docker compose config --quiet
      - run: docker compose up --build --detach --wait
      - run: docker compose exec -T api storyforge demo-m9 --frontend-url http://localhost:3000 --output json
      - run: npm run test:e2e
        working-directory: frontend
        env:
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
      - if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-failure-screenshots
          path: frontend/test-results
          if-no-files-found: ignore
          retention-days: 5
      - if: always()
        run: docker compose down --volumes

  docker-build:
    name: Build and inspect production images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build --tag storyforge:ci .
      - run: docker build --file frontend/Dockerfile --tag storyforge-web:ci .
      - run: docker build --file deploy/ingress.Dockerfile --tag storyforge-gateway:ci .
      - run: docker run --rm storyforge:ci storyforge --help
      - run: docker run --rm storyforge:ci python --version
      - run: docker run --rm storyforge:ci python -c "import storyforge; print(storyforge.__version__)"
      - run: test "$(docker run --rm storyforge:ci id -u)" != "0"
      - run: test "$(docker run --rm storyforge-web:ci id -u)" != "0"
      - run: test "$(docker run --rm storyforge-gateway:ci id -u)" != "0"
      - run: docker compose config --quiet
